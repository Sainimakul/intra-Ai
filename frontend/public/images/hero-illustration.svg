  <rect x="445" y="206" width="75" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="390" y="280" width="180" height="90" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="418" cy="310" r="16" fill="#FFF7ED"/>
