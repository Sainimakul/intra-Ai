  <rect x="50" y="40" width="300" height="320" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="50" y="40" width="300" height="48" rx="16" fill="#2563EB"/>
  <rect x="50" y="72" width="300" height="16" fill="#2563EB"/>
